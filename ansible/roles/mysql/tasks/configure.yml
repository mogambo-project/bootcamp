---
# filename: roles/mysql/tasks/configure.yml
 - name: create mysql config
   template: src="my.cnf.j2" dest="{{ mysql['config']['cnfpath'] }}" mode=0644
   notify:
    - restart mysql service
   tags:
    - configure

 - name: start mysql service
   service:
     name: mysql
     state: started
   tags:
    - configure

 - name: create /root/.my.cnf for root access
   copy:
     dest: /root/.my.cnf
     content: |
       [client]
       user=root
       socket={{ mysql['config']['socket'] }}
     mode: 0600
   tags:
     - configure

 - name: create mysql databases
   mysql_db:
     name: "{{ item.key }}"
     state: "{{ item.value.state }}"
     login_unix_socket: "{{ mysql['config']['socket'] }}"
   with_dict: "{{ mysql['databases'] }}"
   tags:
    - configure 

 - name: create mysql users
   mysql_user:
     name: "{{ item.key }}"
     host: "{{ item.value.host }}"
     password: "{{ item.value.pass }}"
     priv: "{{ item.value.priv }}"
     state: "{{ item.value.state }}"
     login_unix_socket: "{{ mysql['config']['socket'] }}"
   with_dict: "{{ mysql['users'] }}"
   tags:
    - configure
